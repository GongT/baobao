packages:
  - .
  - .opencode/tools
  - '@mpis/*'
  - '@build-script/*'
  - '@gongt/*'
  - '@gongt/*/example'
  - '@gongt/*/examples/*'
  - '@idlebox/*'
  - '@idlebox/itypes/subpackages/*'
  - '@internal/*'
  - standalone/*

# patchedDependencies:
# "@types/tar-stream": "patches/@types__tar-stream.patch"

# npm config
access: public
alwaysAuth: false

enablePrePostScripts: true
fetchRetries: 1000
gitChecks: false

hoist: false
hoistPattern:
  - ""
hoistWorkspacePackages: false
ignoreWorkspaceCycles: true

ignoredOptionalDependencies:
  - fsevents
networkConcurrency: 3
nodeOptions: ''
onlyBuiltDependencies:
  - '@biomejs/biome'
  - esbuild
  - '@swc/core'

overrides:
  ajv: '^8.17.1'
patchedDependencies:
  amaro: patches/amaro.patch
publicHoistPattern:
  - "@types/*"
  - "@biomejs/biome"
  - "source-map-support"

publishConfig:
  gitChecks: false
  preferFrozenLockfile: false
  preferOffline: false
  registry: https://registry.npmjs.org/
registry: https://registry.npmjs.org
savePrefix: '^'

saveWorkspaceProtocol: rolling

# autoInstallPeers: false
strictPeerDependencies: true
