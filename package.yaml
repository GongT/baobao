private: true
type: module
scripts:
  postinstall: node @internal/scripts/loader/repo-post-install.js
  pretty: biome check --diagnostic-level=warn --unsafe
  build: node @mpis/monorepo/loader/bin.devel.js build
  rebuild: bash scripts/simple-clean.sh ; node @mpis/monorepo/loader/bin.devel.js build
  watch: node @mpis/monorepo/loader/bin.devel.js watch
  package-tools: node @build-script/package-tools/bins/load.js
  link: >-
    node @build-script/package-tools/bins/load.js monorepo-link-binaries
    --recursive
  check: node @internal/scripts/loader/repo-check-all.js
  clean: node @internal/scripts/loader/repo-clean.js
  'hook:pre-commit': node @internal/scripts/loader/repo-hook-pre-commit.js
  remote-publish: node @internal/scripts/loader/remote-publish.js
devDependencies:
  '@biomejs/biome': ^2.4.8
  browserslist: ^4.28.1
  execa: ^9.6.1
  typescript: ^6.0.2
packageManager: pnpm@10.33.0
